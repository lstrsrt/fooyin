name: Clang-format check

on:
  push:
    branches-ignore:
      - update-translations
    paths-ignore:
      - '*.md'
      - 'data/translations/**'
  pull_request:
    paths-ignore:
      - '*.md'
      - 'data/translations/**'

jobs:
  formatting-check:
    name: Formatting Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        path:
          - 'src'
          - 'include'
          - 'tests'
    steps:
      - uses: actions/checkout@v6
      - name: Run clang-format style check
        uses: jidicula/clang-format-action@v4.17.0
        with:
          clang-format-version: '22'
          check-path: ${{ matrix.path }}
